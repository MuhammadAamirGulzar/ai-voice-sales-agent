name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install voice engine deps
        run: pip install numpy httpx websockets openai pytest
      - name: Run unit tests
        run: python -m pytest tests/test_voice.py -q
